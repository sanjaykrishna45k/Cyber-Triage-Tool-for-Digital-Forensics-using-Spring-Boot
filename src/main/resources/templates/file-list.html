<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Uploaded Files</title>
    <!-- Add Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Add Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Add SweetAlert CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Custom CSS for styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding-top: 60px; /* Space for fixed navbar */
        }
        .results-card {
            border: 1px solid #ddd;
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .results-card h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        .results-table {
            width: 100%;
            margin-bottom: 20px;
        }
        .results-table th, .results-table td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .results-table th {
            background-color: #f8f9fa;
            font-weight: bold;
            text-align: left;
        }
        .results-table td {
            text-align: right;
        }
        .navbar {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Network Attack Analysis</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/upload}">Upload Dataset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/view}">View Dataset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/preprocess}">Preprocess</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/predict}">Predict</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/blockchain}">FileName Encrypt</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/files}">View Encrypt Files</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h1>Uploaded Files</h1>
        <table class="table">
            <thead>
                <tr>
                    <th>File Name</th>
                    <th>File Hash</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="file : ${files}">
                    <td th:text="${file.fileName}"></td>
                    <td th:text="${file.fileHash}"></td>
                    <td>
                        <!-- Delete Form with CSRF Token -->
                        <form th:action="@{/files/delete/{id}(id=${file.id})}" method="post" style="display: inline;" onsubmit="return confirmDelete()">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
        <a href="/blockchain" class="btn btn-primary">Upload Another File</a>
    </div>

    <!-- Add Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Add SweetAlert JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom JavaScript for delete functionality -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        // Function to confirm deletion
        function confirmDelete() {
            return Swal.fire({
                title: 'Are you sure?',
                text: "You won't be able to revert this!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#3085d6',
                cancelButtonColor: '#d33',
                confirmButtonText: 'Yes, delete it!'
            }).then((result) => {
                return result.isConfirmed; // Return true if confirmed, false otherwise
            });
        }

        // Display success message if available
        const message = /*[[${message}]]*/ '';
        if (message) {
            if (message.includes('successfully')) {
                Swal.fire({
                    icon: 'success',
                    title: 'Success!',
                    text: message,
                    confirmButtonText: 'OK'
                });
            } else if (message.includes('Error')) {
                Swal.fire({
                    icon: 'error',
                    title: 'Error!',
                    text: message,
                    confirmButtonText: 'OK'
                });
            }
        }
        /*]]>*/
    </script>
</body>
</html>
