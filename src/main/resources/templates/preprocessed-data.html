<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>View Dataset</title>
    <!-- Add Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Add Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Add SweetAlert CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Custom CSS for styling -->
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .card-header {
            background-color: #007bff;
            color: white;
            border-radius: 10px 10px 0 0;
            width: 1200px;
        }
        .card-body {
            width: 1200px;
            background-color: #007bff;
        }
        .btn-danger {
            background-color: #dc3545;
            border: none;
        }
        .btn-danger:hover {
            background-color: #c82333;
        }
        .btn-info {
            background-color: #17a2b8;
            border: none;
        }
        .btn-info:hover {
            background-color: #138496;
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Network Attack Analysis</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/upload}">Upload Dataset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/view}">View Dataset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/preprocess}">Preprocess</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/predict}">Predict</a>
                    </li>
					<li class="nav-item">
											<a class="nav-link" th:href="@{/blockchain}">FileName Encrypt</a>
										</li>
										<li class="nav-item">
											<a class="nav-link" th:href="@{/files}">View Encrypt Files</a>
										</li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Preprocessed Network Attack Data</h1>
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>No</th>
                    <th>Time</th>
                    <th>Source</th>
                    <th>Destination</th>
                    <th>Protocol</th>
                    <th>Length</th>
                    <th>Info</th>
                    <th>Is Malicious</th>
                    <th>Packet Size</th>
                    <th>Packet Sent Rate</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="attack : ${preprocessedData}">
                    <td th:text="${attack.no}"></td>
                    <td th:text="${attack.time}"></td>
                    <td th:text="${attack.source}"></td>
                    <td th:text="${attack.destination}"></td>
                    <td th:text="${attack.protocol}"></td>
                    <td th:text="${attack.length}"></td>
                    <td th:text="${attack.info}"></td>
                    <td th:text="${attack.malicious} ? 'Yes' : 'No'"></td>
                    <td th:text="${attack.packetSizeCategory}"></td>
                    <td th:text="${attack.packetSentRate}"></td>
                </tr>
            </tbody>
        </table>
        <a href="/" class="btn btn-primary">Back to Home</a>
    </div>

    <!-- Add Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Add SweetAlert JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Script to trigger SweetAlert -->
    <script th:inline="javascript">
        /*<![CDATA[*/
        const message = /*[[${message}]]*/ '';
        if (message) {
            const isError = message.startsWith('Failed');
            Swal.fire({
                icon: isError ? 'error' : 'success',
                title: isError ? 'Error!' : 'Success!',
                text: message,
                confirmButtonText: 'OK'
            });
        }
        /*]]>*/
    </script>
</body>
</html>
