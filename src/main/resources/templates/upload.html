<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Upload Dataset</title>
	<!-- Add Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Add Font Awesome for icons -->
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
	<!-- Add SweetAlert2 CSS -->
	<link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
	<!-- Custom CSS for styling -->
	<style>
		body {
			background-color: #f8f9fa;
		}

		.card {
			border: none;
			border-radius: 10px;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
		}

		.card-header {
			background-color: #007bff;
			color: white;
			border-radius: 10px 10px 0 0;
		}

		.btn-upload {
			background-color: #28a745;
			color: white;
			transition: background-color 0.3s ease;
		}

		.btn-upload:hover {
			background-color: #218838;
		}

		.container {
			width: 800px;
			height: 500px;
		}

		.card-body {
			height: 200px;
		}
	</style>
</head>

<body>
	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Network Attack Analysis</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/}">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/upload}">Upload Dataset</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/view}">View Dataset</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/preprocess}">Preprocess</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/predict}">Predict</a>
					</li>
					<li class="nav-item">
											<a class="nav-link" th:href="@{/blockchain}">FileName Encrypt</a>
										</li>
										<li class="nav-item">
											<a class="nav-link" th:href="@{/files}">View Encrypt Files</a>
										</li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Main Content -->
	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-8">
				<div class="card shadow">
					<div class="card-header">
						<h3 class="card-title mb-0">Upload Dataset</h3>
					</div>
					<div class="card-body">
						<!-- Upload Form -->
						<form method="POST" th:action="@{/upload}" enctype="multipart/form-data" id="uploadForm">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
							<div class="mb-3">
								<label for="file" class="form-label">Choose a CSV file</label>
								<input type="file" name="file" class="form-control" id="file" required />
							</div>
							<button type="submit" class="btn btn-upload w-100">
								<i class="fas fa-upload me-2"></i> Upload
							</button>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<!-- Add SweetAlert2 JS -->
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
	<!-- Add Bootstrap JS and dependencies -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

	<!-- Script to display SweetAlert messages -->
	<script th:inline="javascript">
		const message = /*[[${message}]]*/ null; // Get the message from Thymeleaf

		if (message) {
			Swal.fire({
				title: message.startsWith("Failed") ? "Error!" : "Success!",
				text: message,
				icon: message.startsWith("Failed") ? "error" : "success",
				confirmButtonText: "OK"
			});
		}
	</script>
</body>

</html>
