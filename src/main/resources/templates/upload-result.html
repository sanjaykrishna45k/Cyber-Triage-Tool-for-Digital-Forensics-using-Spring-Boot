<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload Result</title>
    <!-- Add Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Add Font Awesome for icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <!-- Add SweetAlert CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <!-- Custom CSS for styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            padding-top: 60px; /* Space for fixed navbar */
        }
        .results-card {
            border: 1px solid #ddd;
            padding: 20px;
            max-width: 800px;
            margin: 20px auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .navbar {
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Network Attack Analysis</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/upload}">Upload Dataset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/view}">View Dataset</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/preprocess}">Preprocess</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/predict}">Predict</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/blockchain}">FileName Encrypt</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/files}">View Encrypt Files</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Upload Result Container -->
    <div class="container mt-5">
        <div class="results-card">
            <h2>Upload Result</h2>
            <div class="alert alert-success" th:text="${message}"></div>
            <p>File Name: <span th:text="${fileName}"></span></p>
            <p>File Hash: <span th:text="${fileHash}"></span></p>
            <a href="/files" class="btn btn-primary">View Files</a>
        </div>
    </div>

    <!-- Add Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Add SweetAlert JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Custom JavaScript for file validation -->
    <script>
        // Function to validate file input
        function validateFileInput() {
            const fileInput = document.getElementById('file');
            const file = fileInput.files[0];

            if (file) {
                const fileName = file.name;
                const fileExtension = fileName.split('.').pop().toLowerCase();

                if (fileExtension !== 'csv') {
                    Swal.fire({
                        icon: 'error',
                        title: 'Invalid File Type',
                        text: 'Only CSV files are allowed.',
                        confirmButtonText: 'OK'
                    });
                    fileInput.value = ''; // Clear the file input
                    return false;
                }
            }
            return true;
        }

        // Attach validation to the form submission
        document.querySelector('form').addEventListener('submit', function (event) {
            if (!validateFileInput()) {
                event.preventDefault(); // Prevent form submission
            }
        });

        // Display SweetAlert if there's a success message
        const message = /*[[${message}]]*/ '';
        if (message && message.includes('successfully')) {
            Swal.fire({
                icon: 'success',
                title: 'Upload Successful!',
                text: message,
                confirmButtonText: 'OK'
            });
        }
    </script>
</body>
</html>
