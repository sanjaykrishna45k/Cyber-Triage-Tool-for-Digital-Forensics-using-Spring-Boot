<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Attack Prediction</title>
    <!-- Add Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
	
    <div class="container mt-5">
        <h1>Network Attack Prediction</h1>
        <form id="predictionForm" class="mt-3">
            <div class="mb-3">
                <label for="time" class="form-label">Time</label>
                <input type="number" step="0.1" class="form-control" id="time" required>
            </div>
            <div class="mb-3">
                <label for="source" class="form-label">Source</label>
                <input type="number" class="form-control" id="source" required>
            </div>
            <div class="mb-3">
                <label for="destination" class="form-label">Destination</label>
                <input type="number" class="form-control" id="destination" required>
            </div>
            <div class="mb-3">
                <label for="protocol" class="form-label">Protocol</label>
                <input type="number" class="form-control" id="protocol" required>
            </div>
            <div class="mb-3">
                <label for="length" class="form-label">Length</label>
                <input type="number" class="form-control" id="length" required>
            </div>
            <div class="mb-3">
                <label for="info" class="form-label">Info</label>
                <input type="number" class="form-control" id="info" required>
            </div>
            <button type="submit" class="btn btn-primary">Predict</button>
        </form>
        <div id="predictionResult" class="mt-3"></div>
    </div>

    <!-- Add Bootstrap JS and dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Add custom JS for prediction -->
    <script>
        document.getElementById('predictionForm').addEventListener('submit', function (e) {
            e.preventDefault();

            // Collect input data
            const features = [
                parseFloat(document.getElementById('time').value),
                parseFloat(document.getElementById('source').value),
                parseFloat(document.getElementById('destination').value),
                parseFloat(document.getElementById('protocol').value),
                parseFloat(document.getElementById('length').value),
                parseFloat(document.getElementById('info').value)
            ];

            // Send data to the backend
            fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(features)
            })
            .then(response => response.text())
            .then(result => {
                // Display the prediction result
                document.getElementById('predictionResult').innerText = "Prediction: " + result;
            })
            .catch(error => {
                console.error('Error:', error);
            });
        });
    </script>
</body>
</html>
