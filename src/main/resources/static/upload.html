<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<title>Upload Dataset</title>
	<!-- Add Bootstrap CSS -->
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<!-- Add Font Awesome for icons -->
	<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
	<!-- Custom CSS for styling -->
	<style>
		body {
			background-color: #f8f9fa;
		}

		.card {
			border: none;
			border-radius: 10px;
			box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
		}

		.card-header {
			background-color: #007bff;
			color: white;
			border-radius: 10px 10px 0 0;
		}

		.btn-upload {
			background-color: #28a745;
			color: white;
			transition: background-color 0.3s ease;
		}

		.btn-upload:hover {
			background-color: #218838;
		}
	</style>
</head>

<body>
	<!-- Navbar -->
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
		<div class="container-fluid">
			<a class="navbar-brand" href="#">Network Attack Analysis</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
				aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>
			<div class="collapse navbar-collapse" id="navbarNav">
				<ul class="navbar-nav">
					<li class="nav-item">
						<a class="nav-link" th:href="@{/}">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/upload}">Upload Dataset</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/view}">View Dataset</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/preprocess}">Preprocess</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/predict}">Predict</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:href="@{/blockchain}">Store in Blockchain</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<!-- Main Content -->
	<div class="container mt-5">
		<div class="row justify-content-center">
			<div class="col-md-8">
				<div class="card shadow">
					<div class="card-header">
						<h3 class="card-title mb-0">Upload Dataset</h3>
					</div>
					<div class="card-body">
						<!-- Upload Form -->
						<form method="POST" th:action="@{/upload}" enctype="multipart/form-data">
							<input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
							<div class="mb-3">
								<label for="file" class="form-label">Choose a CSV file</label>
								<input type="file" name="file" class="form-control" id="file" required />
							</div>
							<button type="submit" class="btn btn-upload w-100">
								<i class="fas fa-upload me-2"></i> Upload
							</button>
						</form>


						<!-- Display success/error message -->
						<div th:if="${message}" class="mt-3">
							<p th:text="${message}" class="alert"
								th:classappend="${message.startsWith('Failed')} ? 'alert-danger' : 'alert-success'"></p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	<script>	document.querySelector('form').addEventListener('submit', function (e) {
			e.preventDefault(); // Prevent default form submission
			// Custom logic here
		});</script>
	</script>
	<!-- Add Bootstrap JS and dependencies -->
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
